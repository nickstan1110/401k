<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root {
  --primary-roth: #1D9E75;
  --primary-trad: #6366f1;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #1e293b;
  --text-sub: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  margin: 0;
  padding: 16px;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 900px;
  width: 100%;
  background: var(--bg-card);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
}

h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; }

/* Grid Layouts */
.main-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 768px) {
  .main-grid { grid-template-columns: 1fr 1fr; }
}

.section-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 4px;
}

/* Controls */
.control-group {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.ctrl { display: flex; flex-direction: column; gap: 8px; }
.ctrl label {
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
}
.ctrl span { color: var(--primary-trad); font-weight: 700; }

input[type="range"] {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 5px;
  appearance: none;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 18px;
  height: 18px;
  background: white;
  border: 2px solid var(--primary-trad);
  border-radius: 50%;
  cursor: pointer;
}

/* Metrics */
.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.metric {
  background: var(--bg-main);
  padding: 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.metric-label { font-size: 0.75rem; color: var(--text-sub); margin: 0; }
.metric-value { font-size: 1.25rem; font-weight: 700; margin: 4px 0; }

/* Verdict Box */
#verdict-box {
  margin-top: 20px;
  padding: 16px;
  border-radius: var(--radius);
  font-size: 0.95rem;
  line-height: 1.5;
  border-left: 4px solid var(--primary-trad);
}

.roth-win { border-color: var(--primary-roth) !important; background: #f0fdf4; }
.trad-win { border-color: var(--primary-trad) !important; background: #eef2ff; }

/* Chart */
.chart-container {
  height: 300px;
  margin-top: 24px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Roth vs. Traditional 401(k)</h1>

  <div class="main-grid">
    <div>
      <p class="section-title">Investment Strategy</p>
      <div class="control-group">
        <div class="ctrl">
          <label>Monthly Contribution <span id="contrib-out">$5,000</span></label>
          <input type="range" min="500" max="10000" step="100" value="5000" id="contrib">
        </div>
        <div class="ctrl">
          <label>Years to Growth <span id="years-out">30</span></label>
          <input type="range" min="10" max="45" step="1" value="30" id="years">
        </div>
        <div class="ctrl">
          <label>Annual Return <span id="rate-out">10%</span></label>
          <input type="range" min="3" max="12" step="0.5" value="8" id="rate">
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
          <div class="ctrl">
            <label>Tax Now <span id="ctax-out">25%</span></label>
            <input type="range" min="10" max="50" value="25" id="contrib-tax">
          </div>
          <div class="ctrl">
            <label>Tax Later <span id="wtax-out">25%</span></label>
            <input type="range" min="10" max="50" value="25" id="withdraw-tax">
          </div>
        </div>
      </div>
    </div>

    <div>
      <p class="section-title">Projected Outcomes</p>
      <div class="metric-grid">
        <div class="metric">
          <p class="metric-label">Future Gross Val</p>
          <p class="metric-value" id="future-val">—</p>
        </div>
        <div class="metric">
          <p class="metric-label">Total Principal</p>
          <p class="metric-value" id="total-contrib">—</p>
        </div>
        <div class="metric" style="border-top: 3px solid var(--primary-roth)">
          <p class="metric-label">Roth Tax Paid</p>
          <p class="metric-value" style="color: var(--primary-roth)" id="roth-tax">—</p>
        </div>
        <div class="metric" style="border-top: 3px solid var(--primary-trad)">
          <p class="metric-label">Trad. Tax Due</p>
          <p class="metric-value" style="color: var(--primary-trad)" id="trad-tax">—</p>
        </div>
      </div>

      <div id="verdict-box">
        Calculating your best option...
      </div>
    </div>
  </div>

  <div class="chart-container">
    <canvas id="growthChart"></canvas>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// Keep original logic, update UI hooks
function fv(m, y, r) {
  const rate = r / 100 / 12;
  const n = y * 12;
  return m * (Math.pow(1 + rate, n) - 1) / rate;
}

function fmt(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  return '$' + Math.round(n).toLocaleString();
}

let chart;

function update() {
  const monthly = +document.getElementById('contrib').value;
  const years   = +document.getElementById('years').value;
  const rate    = +document.getElementById('rate').value;
  const ctax    = +document.getElementById('contrib-tax').value;
  const wtax    = +document.getElementById('withdraw-tax').value;

  document.getElementById('contrib-out').textContent = '$' + monthly.toLocaleString();
  document.getElementById('years-out').textContent = years + ' yrs';
  document.getElementById('rate-out').textContent = rate + '%';
  document.getElementById('ctax-out').textContent = ctax + '%';
  document.getElementById('wtax-out').textContent = wtax + '%';

  const totalContrib = monthly * 12 * years;
  const futureVal = fv(monthly, years, rate);
  const rothTax = totalContrib * (ctax / 100);
  const tradTax = futureVal * (wtax / 100);
  const savings = tradTax - rothTax;

  document.getElementById('total-contrib').textContent = fmt(totalContrib);
  document.getElementById('future-val').textContent = fmt(futureVal);
  document.getElementById('roth-tax').textContent = fmt(rothTax);
  document.getElementById('trad-tax').textContent = fmt(tradTax);

  const vBox = document.getElementById('verdict-box');
  if (savings > 0) {
    vBox.className = 'roth-win';
    vBox.innerHTML = `<strong>Roth wins!</strong> By paying taxes now, you save approximately <strong>${fmt(savings)}</strong> in future taxes.`;
  } else {
    vBox.className = 'trad-win';
    vBox.innerHTML = `<strong>Traditional wins!</strong> Your lower expected tax rate in retirement saves you <strong>${fmt(Math.abs(savings))}</strong>.`;
  }

  const labels = [], rothData = [], tradData = [];
  for (let y = 1; y <= years; y++) {
    labels.push('Yr ' + y);
    const g = fv(monthly, y, rate);
    rothData.push(Math.round(g));
    tradData.push(Math.round(g * (1 - wtax / 100)));
  }

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = rothData;
    chart.data.datasets[1].data = tradData;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Roth (After-Tax)', data: rothData, borderColor: '#1D9E75', backgroundColor: '#1D9E7522', fill: true, tension: 0.4, pointRadius: 0 },
          { label: 'Traditional (After-Tax)', data: tradData, borderColor: '#6366f1', borderDash: [5, 5], tension: 0.4, pointRadius: 0 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { y: { ticks: { callback: v => fmt(v) } } }
      }
    });
  }
}

document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
update();
</script>
</body>
</html>
