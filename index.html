<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retirement Tax Strategy</title>
<style>
:root {
  --primary-roth: #1D9E75;
  --primary-trad: #6366f1;
  --bg-main: #f8fafc;
  --bg-card: #ffffff;
  --text-main: #1e293b;
  --text-sub: #64748b;
  --border: #e2e8f0;
  --radius: 12px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  margin: 0;
  padding: 16px;
  display: flex;
  justify-content: center;
}

.container {
  max-width: 950px;
  width: 100%;
  background: var(--bg-card);
  padding: 24px;
  border-radius: 16px;
  box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
}

h1 { font-size: 1.5rem; margin-bottom: 1.5rem; text-align: center; color: var(--text-main); }

.main-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 32px;
}

@media (min-width: 768px) {
  .main-grid { grid-template-columns: 1fr 1.2fr; }
}

.section-title {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.ctrl { display: flex; flex-direction: column; gap: 8px; }
.ctrl label {
  font-size: 0.875rem;
  font-weight: 500;
  display: flex;
  justify-content: space-between;
}
.ctrl span { color: var(--primary-trad); font-weight: 700; }

input[type="range"] {
  width: 100%;
  height: 6px;
  background: var(--border);
  border-radius: 5px;
  appearance: none;
  outline: none;
}

input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 18px;
  height: 18px;
  background: white;
  border: 2px solid var(--primary-trad);
  border-radius: 50%;
  cursor: pointer;
}

.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.metric {
  background: var(--bg-main);
  padding: 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.metric-label { font-size: 0.75rem; color: var(--text-sub); margin: 0; }
.metric-value { font-size: 1.25rem; font-weight: 700; margin: 4px 0; }

#verdict-box {
  margin: 16px 0;
  padding: 16px;
  border-radius: var(--radius);
  font-size: 0.95rem;
  line-height: 1.6;
}

.roth-win { border-left: 4px solid var(--primary-roth); background: #f0fdf4; color: #166534; }
.trad-win { border-left: 4px solid var(--primary-trad); background: #eef2ff; color: #3730a3; }
.tie-box { border-left: 4px solid #94a3b8; background: #f8fafc; color: #475569; }

.chart-container {
  height: 300px;
  margin-top: 24px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Retirement Tax Strategy</h1>

  <div class="main-grid">
    <div>
      <p class="section-title">Assumptions</p>
      <div class="control-group">
        <div class="ctrl">
          <label>Monthly Contribution <span id="contrib-out">$5,000</span></label>
          <input type="range" min="500" max="15000" step="100" value="5000" id="contrib">
        </div>
        <div class="ctrl">
          <label>Years of Growth <span id="years-out">25</span></label>
          <input type="range" min="5" max="45" step="1" value="25" id="years">
        </div>
        <div class="ctrl">
          <label>Annual Return <span id="rate-out">7.5%</span></label>
          <input type="range" min="1" max="12" step="0.5" value="7.5" id="rate">
        </div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 16px;">
          <div class="ctrl">
            <label>Tax Rate Now <span id="ctax-out">25%</span></label>
            <input type="range" min="10" max="50" value="25" id="contrib-tax">
          </div>
          <div class="ctrl">
            <label>Tax Rate Later <span id="wtax-out">25%</span></label>
            <input type="range" min="10" max="50" value="25" id="withdraw-tax">
          </div>
        </div>

        <div class="ctrl">
          <label>Withdrawal Rate (Rule) <span id="rule-out">4%</span></label>
          <input type="range" min="2.5" max="7.5" step="0.1" value="4" id="rule">
        </div>
      </div>

      <p class="section-title" style="margin-top:24px;">Monthly Income Stream</p>
      <div class="metric-grid">
        <div class="metric" style="background: #f0fdf4; border-color: #dcfce7;">
          <p class="metric-label" style="color: #166534;">Roth Monthly</p>
          <p class="metric-value" style="color: var(--primary-roth)" id="roth-monthly">—</p>
        </div>
        <div class="metric" style="background: #eef2ff; border-color: #e0e7ff;">
          <p class="metric-label" style="color: #3730a3;">Trad. Monthly</p>
          <p class="metric-value" style="color: var(--primary-trad)" id="trad-monthly">—</p>
        </div>
      </div>
    </div>

    <div>
      <p class="section-title">Projections</p>
      <div class="metric-grid">
        <div class="metric">
          <p class="metric-label">Total Principal</p>
          <p class="metric-value" id="total-contrib">—</p>
        </div>
        <div class="metric">
          <p class="metric-label">Future Gross Val</p>
          <p class="metric-value" id="future-val">—</p>
        </div>
        <div class="metric" style="border-top: 3px solid var(--primary-roth)">
          <p class="metric-label">Roth Taxes Paid</p>
          <p class="metric-value" style="color: var(--primary-roth)" id="roth-tax">—</p>
        </div>
        <div class="metric" style="border-top: 3px solid var(--primary-trad)">
          <p class="metric-label">Trad. Taxes Due</p>
          <p class="metric-value" style="color: var(--primary-trad)" id="trad-tax">—</p>
        </div>
      </div>

      <div id="verdict-box">Calculating...</div>

      <div class="chart-container">
        <canvas id="growthChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
function fv(m, y, r) {
  const rate = r / 100 / 12;
  const n = y * 12;
  if (rate === 0) return m * n;
  return m * (Math.pow(1 + rate, n) - 1) / rate;
}

function fmt(n) {
  if (n >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return '$' + (n / 1e3).toFixed(0) + 'K';
  return '$' + Math.round(n).toLocaleString();
}

let chart;

function update() {
  const monthlyCont = +document.getElementById('contrib').value;
  const years       = +document.getElementById('years').value;
  const rate        = +document.getElementById('rate').value;
  const ctax        = +document.getElementById('contrib-tax').value;
  const wtax        = +document.getElementById('withdraw-tax').value;
  const rulePct     = +document.getElementById('rule').value;

  document.getElementById('contrib-out').textContent = '$' + monthlyCont.toLocaleString();
  document.getElementById('years-out').textContent = years + ' yrs';
  document.getElementById('rate-out').textContent = rate + '%';
  document.getElementById('ctax-out').textContent = ctax + '%';
  document.getElementById('wtax-out').textContent = wtax + '%';
  document.getElementById('rule-out').textContent = rulePct + '%';

  const totalContrib = monthlyCont * 12 * years;
  const futureVal = fv(monthlyCont, years, rate);
  const rothTax = totalContrib * (ctax / 100);
  const tradTax = futureVal * (wtax / 100);

  const rothMonthly = (futureVal * (rulePct / 100)) / 12;
  const tradMonthly = (futureVal * (1 - wtax/100) * (rulePct / 100)) / 12;

  document.getElementById('total-contrib').textContent = fmt(totalContrib);
  document.getElementById('future-val').textContent = fmt(futureVal);
  document.getElementById('roth-tax').textContent = fmt(rothTax);
  document.getElementById('trad-tax').textContent = fmt(tradTax);
  document.getElementById('roth-monthly').textContent = fmt(rothMonthly);
  document.getElementById('trad-monthly').textContent = fmt(tradMonthly);

  const vBox = document.getElementById('verdict-box');
  // Evaluation solely on amount paid in taxes
  if (rothTax < tradTax) {
    vBox.className = 'roth-win';
    vBox.innerHTML = `<strong>Roth wins.</strong> Paying taxes on contributions costs less than taxing the future value, saving <strong>${fmt(tradTax - rothTax)}</strong> in total taxes.`;
  } else if (rothTax > tradTax) {
    vBox.className = 'trad-win';
    vBox.innerHTML = `<strong>Traditional wins.</strong> Taxing the future value at a lower rate (or due to market conditions) costs less, saving <strong>${fmt(rothTax - tradTax)}</strong> in total taxes.`;
  } else {
    vBox.className = 'tie-box';
    vBox.innerHTML = `<strong>Mathematical Tie.</strong> Total taxes paid are equal for both options at <strong>${fmt(rothTax)}</strong>.`;
  }

  const labels = [], rothData = [], tradData = [];
  for (let y = 1; y <= years; y++) {
    labels.push('Yr ' + y);
    const g = fv(monthlyCont, y, rate);
    rothData.push(Math.round(g));
    tradData.push(Math.round(g * (1 - wtax / 100)));
  }

  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = rothData;
    chart.data.datasets[1].data = tradData;
    chart.update('none');
  } else {
    chart = new Chart(document.getElementById('growthChart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [
          { label: 'Roth (After-Tax)', data: rothData, borderColor: '#1D9E75', backgroundColor: '#1D9E7515', fill: true, tension: 0.4, pointRadius: 0 },
          { label: 'Traditional (After-Tax)', data: tradData, borderColor: '#6366f1', borderDash: [5, 5], tension: 0.4, pointRadius: 0 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom' } },
        scales: { 
            y: { ticks: { callback: v => fmt(v) } },
            x: { ticks: { autoSkip: true } }
        }
      }
    });
  }
}

document.querySelectorAll('input').forEach(i => i.addEventListener('input', update));
update();
</script>
</body>
</html>
